server:
  port: 7086

spring:
  application:
    name: property-service
  
  datasource:
    url: jdbc:mysql://173.249.1.107:3306/globalhub?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: globalhubuser
    password: Ashihundu@2003
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

app:
  upload:
    dir: ${user.dir}/uploads
  base-url: http://localhost:7086

eureka:
  client:
    service-url:
      defaultZone: http://localhost:7071/eureka/
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
