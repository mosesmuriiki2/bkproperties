server:
 port:9104

spring:
  application:
  name: order-service
  
 datasource:
 url: jdbc:mysql://localhost:3306/globalhub?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
   username: root
   password: Password@224
   driver-class-name: com.mysql.cj.jdbc.Driver
 
 jpa:
  hibernate:
     ddl-auto: update
   show-sql: false
  properties:
     hibernate:
       dialect: org.hibernate.dialect.MySQLDialect
       format_sql: true

eureka:
 client:
 service-url:
     defaultZone: http://localhost:7070/eureka/
 instance:
  prefer-ip-address: true
  lease-renewal-interval-in-seconds: 10
  lease-expiration-duration-in-seconds:30
  health-check-url-path: /actuator/health

management:
 endpoints:
   web:
    exposure:
       include: health,info
 endpoint:
  health:
     show-details: always

springdoc:
 api-docs:
   path: /api-docs
 swagger-ui:
   path: /swagger-ui.html
   enabled: true
