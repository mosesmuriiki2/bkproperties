server:
  port: 7072

spring:
  application:
    name: auth-service
  
  datasource:
    url: jdbc:mysql://173.249.1.107:3306/globalhub?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: globalhubuser
    password: Ashihundu@2003
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:7071/eureka/
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

jwt:
  secret: your-secret-key-change-in-production-min-32-chars-at-least-32-characters-long
  expiration: 3600000
  refresh-expiration: 604800000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
